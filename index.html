<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Useful Timer</title>
  <link rel="stylesheet" href="site.css">
</head>
<body>

  <div class="bg-image">
    <img id="bg" src="" alt="background">
  </div>

  <canvas id="analogClock" class="analog-clock" width="180" height="180"></canvas>

  <button class="fullscreen-btn" id="fullscreenBtn" title="Toggle fullscreen">
    <svg id="fsIcon" viewBox="0 0 24 24">
      <polyline points="15 3 21 3 21 9" />
      <polyline points="9 21 3 21 3 15" />
      <line x1="21" y1="3" x2="14" y2="10" />
      <line x1="3" y1="21" x2="10" y2="14" />
    </svg>
  </button>

  <div class="timer-overlay">
    <div class="timer-display" id="display">25:00</div>
    <div class="controls">
      <button id="btn25" class="active" data-minutes="25">25 min</button>
      <button id="btn50" data-minutes="50">50 min</button>
      <button id="startBtn">Start</button>
      <button id="resetBtn" class="reset-btn">Reset</button>
    </div>
  </div>

  <button class="settings-btn" id="settingsBtn" title="Settings">
    <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 1 15.5 12 3.5 3.5 0 0 1 12 15.5Zm7.43-2.53a7.04 7.04 0 0 0 .07-.97 7.04 7.04 0 0 0-.07-.97l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.61-.22l-2.49 1a7.3 7.3 0 0 0-1.67-.97l-.38-2.65A.49.49 0 0 0 14 2h-4a.49.49 0 0 0-.49.42l-.38 2.65a7.3 7.3 0 0 0-1.67.97l-2.49-1a.5.5 0 0 0-.61.22l-2 3.46a.49.49 0 0 0 .12.64L4.57 11a7.04 7.04 0 0 0-.07.97 7.04 7.04 0 0 0 .07.97l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46a.5.5 0 0 0 .61.22l2.49-1a7.3 7.3 0 0 0 1.67.97l.38 2.65A.49.49 0 0 0 10 22h4a.49.49 0 0 0 .49-.42l.38-2.65a7.3 7.3 0 0 0 1.67-.97l2.49 1a.5.5 0 0 0 .61-.22l2-3.46a.49.49 0 0 0-.12-.64Z"/></svg>
  </button>

  <div class="settings-backdrop" id="settingsBackdrop"></div>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-panel__header">
      <span>Settings</span>
      <button class="settings-panel__close" id="settingsClose">&times;</button>
    </div>
    <div class="settings-panel__body">
      <fieldset class="settings-group">
        <legend>Timer Durations (minutes)</legend>
        <div class="settings-row">
          <label for="setTimer1">Timer 1</label>
          <input type="number" id="setTimer1" min="1" max="120" value="25">
        </div>
        <div class="settings-row">
          <label for="setTimer2">Timer 2</label>
          <input type="number" id="setTimer2" min="1" max="120" value="50">
        </div>
      </fieldset>
      <fieldset class="settings-group">
        <legend>Interval Durations (seconds)</legend>
        <div class="settings-row">
          <label for="setInt1">Interval 1</label>
          <input type="number" id="setInt1" min="5" max="600" value="30">
        </div>
        <div class="settings-row">
          <label for="setInt2">Interval 2</label>
          <input type="number" id="setInt2" min="5" max="600" value="30">
        </div>
        <div class="settings-row">
          <label for="setInt3">Interval 3</label>
          <input type="number" id="setInt3" min="5" max="600" value="30">
        </div>
      </fieldset>
      <fieldset class="settings-group">
        <legend>Background Photos</legend>
        <input type="file" id="photoUpload" accept="image/*" style="display:none">
        <div class="settings-upload-row">
          <button type="button" class="settings-upload-label" id="uploadLabel">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add photo
          </button>
        </div>
        <div class="settings-upload-status" id="uploadStatus" aria-live="polite"></div>
        <div class="settings-thumbs" id="userPhotoThumbs"></div>
      </fieldset>
      <fieldset class="settings-group">
        <legend>Sticky Notes</legend>
        <div class="settings-row">
          <label for="setNoteFont">Font</label>
          <select id="setNoteFont">
            <option value="jetbrains">JetBrains Mono</option>
            <option value="fira">Fira Code</option>
            <option value="cascadia">Cascadia Code</option>
            <option value="source">Source Code Pro</option>
            <option value="ibmplex">IBM Plex Mono</option>
            <option value="iosevka">Iosevka</option>
            <option value="hack">Hack</option>
            <option value="ubuntu">Ubuntu Mono</option>
            <option value="inconsolata">Inconsolata</option>
            <option value="space">Space Mono</option>
            <option value="victor">Victor Mono</option>
            <option value="anonymous">Anonymous Pro</option>
            <option value="consolas">Consolas</option>
            <option value="menlo">Menlo</option>
            <option value="monaco">Monaco</option>
            <option value="courier">Courier New</option>
          </select>
        </div>
      </fieldset>
      <button class="settings-save" id="settingsSave">Save</button>
    </div>
  </div>

  <div class="note-spawn-layer" id="noteSpawnLayer"></div>
  <div id="stickyNotesRoot" class="sticky-notes-root"></div>

  <div class="interval-overlay" id="intervalOverlay">
    <div class="gauge-row">
      <button id="bellToggle" class="bell-btn active" title="Toggle bell"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
      <canvas id="gauge1" class="gauge-canvas" width="120" height="120"></canvas>
      <canvas id="gauge2" class="gauge-canvas" width="120" height="120"></canvas>
      <canvas id="gauge3" class="gauge-canvas" width="120" height="120"></canvas>
    </div>
  </div>

  <div class="timeline-strip" id="timelineStrip"></div>
  <div class="timeline-tooltip" id="timelineTooltip"></div>
  <div class="timeline-note-overlay" id="timelineNoteOverlay">
    <div class="timeline-note-editor">
      <div class="timeline-note-editor__header">
        <span id="timelineNoteDate"></span>
        <button class="timeline-note-editor__close" id="timelineNoteClose" type="button">&times;</button>
      </div>
      <textarea class="timeline-note-editor__textarea" id="timelineNoteTextarea" placeholder="Write a note..."></textarea>
    </div>
  </div>

  <script>
    const BASE_IMAGES = [
      'images/paulrousso_human_kindness_is_overflowing_and_I_think_its_going__d28b94bd-65a3-45e2-972b-bc689bf0f591.webp',
      'images/paulrousso_human_kindness_is_overflowing_and_I_think_its_going__6b8dc34d-329e-47ad-aa9b-124c2428ec3f.webp',
      'images/paulrousso_beautiful_farmland_with_pond_painted_in_a_norman_roc_c823e224-f60c-4c01-82b6-ee8175e35897.webp',
      'images/tiktik8644_cinematic_sci-fi_movie._A_narrow_corridor_in_an_indu_e1b3b0ea-8620-4c40-901d-69cf12b35197.webp'
    ];

    const USER_IMAGES_KEY = 'pomodoro_user_images';

    function loadUserImages() {
      const raw = localStorage.getItem(USER_IMAGES_KEY);
      if (!raw) return [];
      try { const arr = JSON.parse(raw); return Array.isArray(arr) ? arr : []; } catch { return []; }
    }

    function saveUserImages(arr) {
      localStorage.setItem(USER_IMAGES_KEY, JSON.stringify(arr));
    }

    let userImages = loadUserImages();
    let IMAGES = BASE_IMAGES.concat(userImages);

    const SETTINGS_KEY = 'pomodoro_settings';
    const NOTE_FONT_KEY_DEFAULT = 'jetbrains';
    const NOTE_FONT_STACKS = {
      jetbrains: '"JetBrains Mono", "Cascadia Mono", "Fira Code", Menlo, Consolas, "Liberation Mono", monospace',
      fira: '"Fira Code", "Cascadia Mono", "JetBrains Mono", Menlo, Consolas, "Liberation Mono", monospace',
      cascadia: '"Cascadia Code", "Cascadia Mono", "JetBrains Mono", Menlo, Consolas, "Liberation Mono", monospace',
      source: '"Source Code Pro", "JetBrains Mono", "Cascadia Mono", Menlo, Consolas, "Liberation Mono", monospace',
      ibmplex: '"IBM Plex Mono", "JetBrains Mono", "Cascadia Mono", Menlo, Consolas, "Liberation Mono", monospace',
      iosevka: '"Iosevka", "JetBrains Mono", "Cascadia Mono", Menlo, Consolas, "Liberation Mono", monospace',
      hack: '"Hack", "JetBrains Mono", "Cascadia Mono", Menlo, Consolas, "Liberation Mono", monospace',
      ubuntu: '"Ubuntu Mono", "JetBrains Mono", "Cascadia Mono", Menlo, Consolas, "Liberation Mono", monospace',
      inconsolata: '"Inconsolata", "Source Code Pro", "JetBrains Mono", Menlo, Consolas, "Liberation Mono", monospace',
      space: '"Space Mono", "IBM Plex Mono", "JetBrains Mono", Menlo, Consolas, "Liberation Mono", monospace',
      victor: '"Victor Mono", "Fira Code", "JetBrains Mono", Menlo, Consolas, "Liberation Mono", monospace',
      anonymous: '"Anonymous Pro", "Source Code Pro", "JetBrains Mono", Menlo, Consolas, "Liberation Mono", monospace',
      consolas: 'Consolas, "Cascadia Mono", "JetBrains Mono", Menlo, "Liberation Mono", monospace',
      menlo: 'Menlo, "Cascadia Mono", "JetBrains Mono", Consolas, "Liberation Mono", monospace',
      monaco: 'Monaco, Menlo, "Cascadia Mono", "JetBrains Mono", Consolas, "Liberation Mono", monospace',
      courier: '"Courier New", Courier, "Liberation Mono", monospace'
    };
    const DEFAULT_SETTINGS = { timer1: 25, timer2: 50, int1: 30, int2: 30, int3: 30, noteFont: NOTE_FONT_KEY_DEFAULT };

    function loadSettings() {
      const raw = localStorage.getItem(SETTINGS_KEY);
      if (!raw) return { ...DEFAULT_SETTINGS };
      try { return { ...DEFAULT_SETTINGS, ...JSON.parse(raw) }; } catch { return { ...DEFAULT_SETTINGS }; }
    }

    function saveSettings(s) {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
    }

    let settings = loadSettings();

    function getResolvedNoteFontKey(fontKey) {
      return NOTE_FONT_STACKS[fontKey] ? fontKey : NOTE_FONT_KEY_DEFAULT;
    }

    function applyStickyFontSetting() {
      const resolvedKey = getResolvedNoteFontKey(settings.noteFont);
      settings.noteFont = resolvedKey;
      document.documentElement.style.setProperty('--sticky-note-font', NOTE_FONT_STACKS[resolvedKey]);
    }

    applyStickyFontSetting();

    const KEY = 'pomodoro_state';
    const display = document.getElementById('display');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const btn25 = document.getElementById('btn25');
    const btn50 = document.getElementById('btn50');

    let totalSeconds = settings.timer1 * 60;
    let remainingSeconds = totalSeconds;
    let running = false;
    let intervalId = null;
    let currentImageIdx = 0;

    let audioCtx = null;

    function showImage(idx) {
      if (!IMAGES.length) {
        document.getElementById('bg').src = '';
        currentImageIdx = 0;
        return;
      }
      currentImageIdx = ((idx % IMAGES.length) + IMAGES.length) % IMAGES.length;
      document.getElementById('bg').src = IMAGES[currentImageIdx];
    }

    function pickRandomImage() {
      showImage(Math.floor(Math.random() * IMAGES.length));
    }

    function saveState() {
      const state = {
        totalSeconds,
        remainingSeconds,
        running,
        timestamp: Date.now()
      };
      localStorage.setItem(KEY, JSON.stringify(state));
    }

    function loadState() {
      const raw = localStorage.getItem(KEY);
      if (!raw) return false;
      try {
        const state = JSON.parse(raw);
        totalSeconds = state.totalSeconds;
        remainingSeconds = state.remainingSeconds;

        if (state.running) {
          const elapsed = Math.floor((Date.now() - state.timestamp) / 1000);
          remainingSeconds = Math.max(0, state.remainingSeconds - elapsed);
          running = true;
        }

        return true;
      } catch {
        return false;
      }
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function updateDisplay() {
      display.textContent = formatTime(remainingSeconds);

      const warningThreshold = totalSeconds * 0.1;
      display.classList.toggle('warning', remainingSeconds > 0 && remainingSeconds <= warningThreshold);
      display.classList.toggle('done', remainingSeconds === 0 && running);
    }

    function applyTimerLabels() {
      btn25.textContent = settings.timer1 + ' min';
      btn25.dataset.minutes = settings.timer1;
      btn50.textContent = settings.timer2 + ' min';
      btn50.dataset.minutes = settings.timer2;
    }
    applyTimerLabels();

    function updateDurationButtons() {
      const isMode1 = totalSeconds === settings.timer1 * 60;
      btn25.classList.toggle('active', isMode1);
      btn50.classList.toggle('active', !isMode1);
    }

    let buzzerNodes = null;
    let timerAlarmPlayed = false;
    function playBuzzer() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const duration = 5;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'square';
      osc.frequency.value = 440;
      const t = audioCtx.currentTime;
      gain.gain.setValueAtTime(0.15, t);
      for (let i = 0; i < duration * 4; i++) {
        const on = t + i * 0.25;
        gain.gain.setValueAtTime(0.15, on);
        gain.gain.setValueAtTime(0.02, on + 0.15);
      }
      gain.gain.setValueAtTime(0, t + duration);
      osc.start(t);
      osc.stop(t + duration);
      buzzerNodes = { osc, gain };
    }

    function stopBuzzer() {
      if (buzzerNodes) {
        try {
          buzzerNodes.gain.gain.cancelScheduledValues(0);
          buzzerNodes.gain.gain.setValueAtTime(0, audioCtx.currentTime);
          buzzerNodes.osc.stop();
        } catch {}
        buzzerNodes = null;
      }
    }

    function tick() {
      if (remainingSeconds > 0) {
        remainingSeconds--;
        updateDisplay();
        saveState();
      }
      if (remainingSeconds <= 0) {
        running = false;
        clearInterval(intervalId);
        intervalId = null;
        startBtn.textContent = 'Start';
        display.textContent = '00:00';
        display.classList.add('done');
        document.title = 'Done!';
        if (!timerAlarmPlayed) {
          playBuzzer();
          timerAlarmPlayed = true;
        }
        saveState();
      }
    }

    function startTimer() {
      if (remainingSeconds <= 0) return;
      running = true;
      timerAlarmPlayed = false;
      startBtn.textContent = 'Pause';
      intervalId = setInterval(tick, 1000);
      saveState();
    }

    function pauseTimer() {
      running = false;
      timerAlarmPlayed = false;
      startBtn.textContent = 'Start';
      clearInterval(intervalId);
      intervalId = null;
      display.classList.remove('done');
      stopBuzzer();
      saveState();
    }

    function resetTimer() {
      pauseTimer();
      remainingSeconds = totalSeconds;
      updateDisplay();
      document.title = 'Useful Timer';
      saveState();
    }

    function setDuration(minutes) {
      pauseTimer();
      totalSeconds = minutes * 60;
      remainingSeconds = totalSeconds;
      updateDurationButtons();
      updateDisplay();
      document.title = 'Useful Timer';
      saveState();
    }

    startBtn.addEventListener('click', () => {
      running ? pauseTimer() : startTimer();
    });

    resetBtn.addEventListener('click', resetTimer);
    btn25.addEventListener('click', () => setDuration(settings.timer1));
    btn50.addEventListener('click', () => setDuration(settings.timer2));

    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const fsIcon = document.getElementById('fsIcon');

    const expandSVG = '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>';
    const shrinkSVG = '<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/>';

    function updateFsIcon() {
      fsIcon.innerHTML = document.fullscreenElement ? shrinkSVG : expandSVG;
    }

    fullscreenBtn.addEventListener('click', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.documentElement.requestFullscreen();
      }
    });

    document.addEventListener('fullscreenchange', updateFsIcon);

    function isEditableTarget(target) {
      if (!target) return false;
      const tagName = target.tagName;
      return target.isContentEditable || tagName === 'TEXTAREA' || tagName === 'INPUT' || tagName === 'SELECT';
    }

    document.addEventListener('keydown', (e) => {
      if (isEditableTarget(e.target)) return;
      if (e.key === 'ArrowRight') {
        showImage(currentImageIdx + 1);
      } else if (e.key === 'ArrowLeft') {
        showImage(currentImageIdx - 1);
      }
    });

    const POSITIONS_KEY = 'pomodoro_positions';
    const MARGIN = 24;
    const DRAGGABLE_SNAP_STEP = 20;
    const STICKY_SNAP_STEP = 8;

    function snapCoordToGrid(value, min, max, step) {
      if (max < min) return min;
      const v = Math.max(min, Math.min(value, max));
      if (step <= 0) return v;
      const snapped = min + Math.round((v - min) / step) * step;
      return Math.max(min, Math.min(snapped, max));
    }

    function snapTo(el, x, y) {
      const rect = el.getBoundingClientRect();
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const elW = rect.width;
      const elH = rect.height;
      const maxX = vw - elW - MARGIN;
      const maxY = vh - elH - MARGIN;
      return {
        x: snapCoordToGrid(x, MARGIN, maxX, DRAGGABLE_SNAP_STEP),
        y: snapCoordToGrid(y, MARGIN, maxY, DRAGGABLE_SNAP_STEP)
      };
    }

    function applyPosition(el, x, y) {
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.right = 'auto';
      el.style.bottom = 'auto';
      el.style.transform = 'none';
    }

    function savePositions() {
      const data = {};
      for (const [key, el] of Object.entries(draggables)) {
        data[key] = { x: parseFloat(el.style.left), y: parseFloat(el.style.top) };
      }
      localStorage.setItem(POSITIONS_KEY, JSON.stringify(data));
    }

    function loadPositions() {
      const raw = localStorage.getItem(POSITIONS_KEY);
      if (!raw) return null;
      try { return JSON.parse(raw); } catch { return null; }
    }

    function makeDraggable(el, id) {
      let offsetX, offsetY, isDragging = false;

      el.addEventListener('pointerdown', (e) => {
        if (e.target.tagName === 'BUTTON') return;
        e.preventDefault();
        const rect = el.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        isDragging = true;
        el.classList.add('dragging');
        el.setPointerCapture(e.pointerId);
      });

      document.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        applyPosition(el, e.clientX - offsetX, e.clientY - offsetY);
      });

      document.addEventListener('pointerup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        el.classList.remove('dragging');
        const rect = el.getBoundingClientRect();
        const snap = snapTo(el, rect.left, rect.top);
        applyPosition(el, snap.x, snap.y);
        savePositions();
      });
    }

    const timerOverlay = document.querySelector('.timer-overlay');
    const intervalOverlay = document.getElementById('intervalOverlay');
    const draggables = {
      clock: document.getElementById('analogClock'),
      timer: timerOverlay,
      intervals: intervalOverlay
    };

    function getDefaultPosition(key, el) {
      const rect = el.getBoundingClientRect();
      if (key === 'clock') return { x: MARGIN, y: MARGIN };
      if (key === 'intervals') return { x: window.innerWidth - rect.width - MARGIN, y: (window.innerHeight - rect.height) / 2 };
      return { x: (window.innerWidth - rect.width) / 2, y: window.innerHeight - rect.height - MARGIN };
    }

    function initPositions() {
      const saved = loadPositions();
      for (const [key, el] of Object.entries(draggables)) {
        if (saved && saved[key]) {
          applyPosition(el, saved[key].x, saved[key].y);
        } else {
          const defaults = getDefaultPosition(key, el);
          applyPosition(el, defaults.x, defaults.y);
        }
        makeDraggable(el, key);
      }
    }

    initPositions();
    window.addEventListener('resize', () => {
      for (const [key, el] of Object.entries(draggables)) {
        const rect = el.getBoundingClientRect();
        const snap = snapTo(el, rect.left, rect.top);
        applyPosition(el, snap.x, snap.y);
      }
      savePositions();
    });

    const STICKY_NOTES_KEY = 'pomodoro_sticky_notes';
    const stickyNotesRoot = document.getElementById('stickyNotesRoot');
    const noteSpawnLayer = document.getElementById('noteSpawnLayer');

    let stickySaveTimer = null;
    function saveStickyNotesNow() {
      const payload = [];
      stickyNotesRoot.querySelectorAll('.sticky-note').forEach((note) => {
        const ta = note.querySelector('.sticky-note__textarea');
        const stampEl = note.querySelector('.sticky-note__stamp');
        payload.push({
          id: note.dataset.noteId,
          x: parseFloat(note.style.left) || 0,
          y: parseFloat(note.style.top) || 0,
          w: note.offsetWidth,
          h: note.offsetHeight,
          text: ta ? ta.value : '',
          stamp: stampEl ? stampEl.textContent : ''
        });
      });
      localStorage.setItem(STICKY_NOTES_KEY, JSON.stringify(payload));
    }
    function scheduleStickySave() {
      clearTimeout(stickySaveTimer);
      stickySaveTimer = setTimeout(saveStickyNotesNow, 300);
    }

    let stickyDrag = null;
    let stickyResize = null;

    function findMergeTarget(draggedNote, clientX, clientY) {
      const allNotes = stickyNotesRoot.querySelectorAll('.sticky-note');
      for (const other of allNotes) {
        if (other === draggedNote) continue;
        const or = other.getBoundingClientRect();
        if (clientX >= or.left && clientX <= or.right && clientY >= or.top && clientY <= or.bottom) {
          return other;
        }
      }
      return null;
    }

    function clearMergeHighlights() {
      stickyNotesRoot.querySelectorAll('.sticky-note--merge-target').forEach(
        n => n.classList.remove('sticky-note--merge-target')
      );
    }

    document.addEventListener('pointermove', (e) => {
      if (stickyDrag) {
        const { note, offX, offY } = stickyDrag;
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const w = note.offsetWidth;
        const h = note.offsetHeight;
        let nx = e.clientX - offX;
        let ny = e.clientY - offY;
        nx = Math.max(0, Math.min(nx, vw - w));
        ny = Math.max(0, Math.min(ny, vh - h));
        note.style.left = nx + 'px';
        note.style.top = ny + 'px';

        clearMergeHighlights();
        const target = findMergeTarget(note, e.clientX, e.clientY);
        if (target) target.classList.add('sticky-note--merge-target');
      } else if (stickyResize) {
        const { note, startX, startY, startW, startH } = stickyResize;
        const dw = e.clientX - startX;
        const dh = e.clientY - startY;
        const minW = 160;
        const minH = 120;
        const maxW = Math.min(window.innerWidth * 0.9, 560);
        const maxH = Math.min(window.innerHeight * 0.85, 480);
        const nw = Math.max(minW, Math.min(startW + dw, maxW));
        const nh = Math.max(minH, Math.min(startH + dh, maxH));
        note.style.width = nw + 'px';
        note.style.height = nh + 'px';
      }
    });

    document.addEventListener('pointerup', (e) => {
      if (stickyDrag) {
        const draggedNote = stickyDrag.note;
        draggedNote.classList.remove('dragging');
        clearMergeHighlights();

        const target = findMergeTarget(draggedNote, e.clientX, e.clientY);
        if (target) {
          const draggedTa = draggedNote.querySelector('.sticky-note__textarea');
          const targetTa = target.querySelector('.sticky-note__textarea');
          const draggedText = draggedTa ? draggedTa.value.trim() : '';
          const targetText = targetTa ? targetTa.value : '';

          const now = new Date();
          const pad = (n) => String(n).padStart(2, '0');
          const stampStr = pad(now.getMonth() + 1) + '/' + pad(now.getDate()) + '/' + now.getFullYear()
            + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes());

          if (targetTa && draggedText) {
            targetTa.value = targetText + (targetText.trim() ? '\n' : '')
              + '── ' + stampStr + ' ──\n' + draggedText;
          }

          draggedNote.remove();
        } else {
          const vw = window.innerWidth;
          const vh = window.innerHeight;
          const w = draggedNote.offsetWidth;
          const h = draggedNote.offsetHeight;
          let nx = parseFloat(draggedNote.style.left) || 0;
          let ny = parseFloat(draggedNote.style.top) || 0;
          const maxX = Math.max(0, vw - w);
          const maxY = Math.max(0, vh - h);
          nx = snapCoordToGrid(nx, 0, maxX, STICKY_SNAP_STEP);
          ny = snapCoordToGrid(ny, 0, maxY, STICKY_SNAP_STEP);
          draggedNote.style.left = nx + 'px';
          draggedNote.style.top = ny + 'px';
        }

        stickyDrag = null;
        saveStickyNotesNow();
      }
      if (stickyResize) {
        const note = stickyResize.note;
        note.classList.remove('dragging');
        const minW = 160;
        const minH = 120;
        const maxW = Math.min(window.innerWidth * 0.9, 560);
        const maxH = Math.min(window.innerHeight * 0.85, 480);
        let w = note.offsetWidth;
        let h = note.offsetHeight;
        w = snapCoordToGrid(w, minW, maxW, STICKY_SNAP_STEP);
        h = snapCoordToGrid(h, minH, maxH, STICKY_SNAP_STEP);
        note.style.width = w + 'px';
        note.style.height = h + 'px';
        stickyResize = null;
        saveStickyNotesNow();
      }
    });

    function mountStickyNote(data) {
      const id = data.id || ('n' + Date.now() + '_' + Math.random().toString(36).slice(2, 9));
      const note = document.createElement('div');
      note.className = 'sticky-note';
      note.dataset.noteId = id;
      note.style.left = (data.x ?? 48) + 'px';
      note.style.top = (data.y ?? 48) + 'px';
      note.style.width = (data.w || 220) + 'px';
      note.style.height = (data.h || 170) + 'px';

      const header = document.createElement('div');
      header.className = 'sticky-note__header';
      const stamp = document.createElement('span');
      stamp.className = 'sticky-note__stamp';
      stamp.textContent = data.stamp || '';
      header.appendChild(stamp);
      const closeBtn = document.createElement('button');
      closeBtn.type = 'button';
      closeBtn.className = 'sticky-note__close';
      closeBtn.setAttribute('aria-label', 'Close note');
      closeBtn.textContent = '\u00D7';
      header.appendChild(closeBtn);

      const body = document.createElement('div');
      body.className = 'sticky-note__body';
      const ta = document.createElement('textarea');
      ta.className = 'sticky-note__textarea';
      ta.placeholder = '';
      ta.value = data.text || '';
      const resize = document.createElement('div');
      resize.className = 'sticky-note__resize';
      resize.setAttribute('aria-hidden', 'true');
      body.appendChild(ta);
      body.appendChild(resize);

      note.appendChild(header);
      note.appendChild(body);
      stickyNotesRoot.appendChild(note);

      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        note.remove();
        saveStickyNotesNow();
      });

      ta.addEventListener('input', scheduleStickySave);

      header.addEventListener('pointerdown', (e) => {
        if (e.target === closeBtn) return;
        e.preventDefault();
        stickyResize = null;
        const rect = note.getBoundingClientRect();
        stickyDrag = {
          note,
          offX: e.clientX - rect.left,
          offY: e.clientY - rect.top
        };
        note.classList.add('dragging');
        header.setPointerCapture(e.pointerId);
      });

      resize.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        stickyDrag = null;
        stickyResize = {
          note,
          startX: e.clientX,
          startY: e.clientY,
          startW: note.offsetWidth,
          startH: note.offsetHeight
        };
        note.classList.add('dragging');
        resize.setPointerCapture(e.pointerId);
      });

      return note;
    }

    function loadStickyNotes() {
      const raw = localStorage.getItem(STICKY_NOTES_KEY);
      if (!raw) return;
      try {
        const list = JSON.parse(raw);
        if (!Array.isArray(list)) return;
        list.forEach((item) => mountStickyNote(item));
      } catch {}
    }

    noteSpawnLayer.addEventListener('click', (e) => {
      if (e.target !== noteSpawnLayer) return;
      const w = 220;
      const h = 170;
      let x = e.clientX - w / 2;

      const inset = 8;
      x = Math.max(inset, Math.min(x, vw - w - inset));
      y = Math.max(inset, Math.min(y, vh - h - inset));
      x = snapCoordToGrid(x, inset, vw - w - inset, STICKY_SNAP_STEP);
      y = snapCoordToGrid(y, inset, vh - h - inset, STICKY_SNAP_STEP);
      mountStickyNote({ x, y, w, h, text: '' });

    const clockCanvas = document.getElementById('analogClock');
    const ctx = clockCanvas.getContext('2d');
    const clockSize = clockCanvas.width;
    const center = clockSize / 2;
    const radius = center - 8;

    function drawClock() {
      const now = new Date();
      const h = now.getHours() % 12;
      const m = now.getMinutes();
      const s = now.getSeconds();

      ctx.clearRect(0, 0, clockSize, clockSize);

      ctx.beginPath();
      ctx.arc(center, center, radius, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,.35)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.5)';
      ctx.lineWidth = 2;
      ctx.stroke();

      if (running && remainingSeconds > 0) {
        const nowAngle = ((m + s / 60) / 60) * Math.PI * 2 - Math.PI / 2;
        const sweep = (Math.min(remainingSeconds, 3600) / 3600) * Math.PI * 2;
        const endAngle = nowAngle + sweep;
        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius - 2, nowAngle, endAngle);
        ctx.closePath();
        const isWarning = remainingSeconds <= totalSeconds * 0.1;
        ctx.fillStyle = isWarning ? 'rgba(255,80,80,.35)' : 'rgba(255,255,255,.25)';
        ctx.fill();
      }

      for (let i = 0; i < 12; i++) {
        const angle = (i * Math.PI) / 6 - Math.PI / 2;
        const isMajor = i % 3 === 0;
        const inner = radius - (isMajor ? 18 : 10);
        const outer = radius - 4;
        ctx.beginPath();
        ctx.moveTo(center + inner * Math.cos(angle), center + inner * Math.sin(angle));
        ctx.lineTo(center + outer * Math.cos(angle), center + outer * Math.sin(angle));
        ctx.strokeStyle = 'rgba(255,255,255,.7)';
        ctx.lineWidth = isMajor ? 3 : 1.5;
        ctx.stroke();
      }

      for (let i = 0; i < 60; i++) {
        if (i % 5 === 0) continue;
        const angle = (i * Math.PI) / 30 - Math.PI / 2;
        const dotR = radius - 7;
        ctx.beginPath();
        ctx.arc(center + dotR * Math.cos(angle), center + dotR * Math.sin(angle), 1, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,.3)';
        ctx.fill();
      }

      function drawHand(angle, length, width, color) {
        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.lineTo(center + length * Math.cos(angle), center + length * Math.sin(angle));
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.lineCap = 'round';
        ctx.stroke();
      }

      const hourAngle = ((h + m / 60) * Math.PI) / 6 - Math.PI / 2;
      drawHand(hourAngle, radius * 0.5, 4, 'rgba(255,255,255,.9)');

      const minAngle = ((m + s / 60) * Math.PI) / 30 - Math.PI / 2;
      drawHand(minAngle, radius * 0.72, 2.5, 'rgba(255,255,255,.8)');

      const secAngle = (s * Math.PI) / 30 - Math.PI / 2;
      drawHand(secAngle, radius * 0.78, 1, 'rgba(255,120,120,.8)');

      ctx.beginPath();
      ctx.arc(center, center, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    }

    const INTERVAL_COUNT = 3;
    let intervalDurations = [settings.int1, settings.int2, settings.int3];
    let cycleDuration = intervalDurations.reduce((a, b) => a + b, 0);
    const gaugeCanvases = [
      document.getElementById('gauge1'),
      document.getElementById('gauge2'),
      document.getElementById('gauge3')
    ];
    const gaugeCtxs = gaugeCanvases.map(c => c.getContext('2d'));

    let bellEnabled = localStorage.getItem('pomodoro_bell') !== 'off';
    const bellToggle = document.getElementById('bellToggle');
    bellToggle.classList.toggle('active', bellEnabled);

    bellToggle.addEventListener('click', () => {
      bellEnabled = !bellEnabled;
      bellToggle.classList.toggle('active', bellEnabled);
      localStorage.setItem('pomodoro_bell', bellEnabled ? 'on' : 'off');
    });

    function playBell() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      function ding(delay) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.value = 880;
        const t = audioCtx.currentTime + delay;
        gain.gain.setValueAtTime(0.3, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
        osc.start(t);
        osc.stop(t + 0.6);
      }
      ding(0);
      ding(0.35);
    }

    const ARC_START = 0.75 * Math.PI;
    const ARC_END = 2.25 * Math.PI;
    const ARC_RANGE = ARC_END - ARC_START;

    function drawGauge(gCtx, label, fraction, seconds) {
      const size = 120;
      const cx = size / 2;
      const cy = size / 2;
      const r = 48;
      const lineW = 8;

      gCtx.clearRect(0, 0, size, size);

      gCtx.beginPath();
      gCtx.arc(cx, cy, r, ARC_START, ARC_END);
      gCtx.strokeStyle = 'rgba(255,255,255,.12)';
      gCtx.lineWidth = lineW;
      gCtx.lineCap = 'round';
      gCtx.stroke();

      if (fraction > 0) {
        const endAngle = ARC_START + fraction * ARC_RANGE;
        gCtx.beginPath();
        gCtx.arc(cx, cy, r, ARC_START, endAngle);
        gCtx.strokeStyle = fraction >= 1 ? 'rgba(255,255,255,.9)' : 'rgba(255,255,255,.6)';
        gCtx.lineWidth = lineW;
        gCtx.lineCap = 'round';
        gCtx.stroke();
      }

      for (let i = 0; i <= 6; i++) {
        const tickAngle = ARC_START + (i / 6) * ARC_RANGE;
        const inner = r - lineW / 2 - 2;
        const outer = r - lineW / 2 - 7;
        gCtx.beginPath();
        gCtx.moveTo(cx + inner * Math.cos(tickAngle), cy + inner * Math.sin(tickAngle));
        gCtx.lineTo(cx + outer * Math.cos(tickAngle), cy + outer * Math.sin(tickAngle));
        gCtx.strokeStyle = 'rgba(255,255,255,.3)';
        gCtx.lineWidth = 1.5;
        gCtx.lineCap = 'round';
        gCtx.stroke();
      }

      gCtx.fillStyle = '#fff';
      gCtx.font = '700 22px "Segoe UI", sans-serif';
      gCtx.textAlign = 'center';
      gCtx.textBaseline = 'middle';
      gCtx.fillText(seconds + 's', cx, cy);

      gCtx.fillStyle = 'rgba(255,255,255,.5)';
      gCtx.font = '600 11px "Segoe UI", sans-serif';
      gCtx.fillText(label, cx, cy + r + 8);
    }

    let prevCycleElapsed = null;

    function getIntervalSlot(elapsed) {
      let cumulative = 0;
      for (let i = 0; i < INTERVAL_COUNT; i++) {
        cumulative += intervalDurations[i];
        if (elapsed < cumulative) return i;
      }
      return INTERVAL_COUNT - 1;
    }

    function updateIntervalBars() {
      const now = new Date();
      const totalSec = now.getMinutes() * 60 + now.getSeconds();
      const cycleElapsed = totalSec % cycleDuration;

      let barStart = 0;
      for (let i = 0; i < INTERVAL_COUNT; i++) {
        const dur = intervalDurations[i];
        const barElapsed = cycleElapsed - barStart;
        let fraction, seconds;
        if (barElapsed >= dur) {
          fraction = 1;
          seconds = dur;
        } else if (barElapsed > 0) {
          fraction = barElapsed / dur;
          seconds = barElapsed;
        } else {
          fraction = 0;
          seconds = 0;
        }
        drawGauge(gaugeCtxs[i], String(i + 1), fraction, seconds);
        barStart += dur;
      }

      if (prevCycleElapsed !== null) {
        const prevSlot = getIntervalSlot(prevCycleElapsed);
        const currSlot = getIntervalSlot(cycleElapsed);
        if (bellEnabled && (currSlot !== prevSlot || cycleElapsed < prevCycleElapsed)) {
          playBell();
        }
      }

      prevCycleElapsed = cycleElapsed;
    }

    updateIntervalBars();

    drawClock();
    setInterval(() => { drawClock(); updateIntervalBars(); }, 1000);

    const photoUpload = document.getElementById('photoUpload');
    const userPhotoThumbs = document.getElementById('userPhotoThumbs');
    const uploadStatus = document.getElementById('uploadStatus');

    function renderUserThumbs() {
      userPhotoThumbs.innerHTML = '';
      userImages.forEach((dataUrl, idx) => {
        const wrap = document.createElement('div');
        wrap.className = 'settings-thumb';
        const img = document.createElement('img');
        img.src = dataUrl;
        const del = document.createElement('button');
        del.className = 'settings-thumb__del';
        del.type = 'button';
        del.textContent = '\u00D7';
        del.addEventListener('click', () => {
          const nextImages = userImages.filter((_, imageIdx) => imageIdx !== idx);
          try {
            saveUserImages(nextImages);
            userImages = nextImages;
            IMAGES = BASE_IMAGES.concat(userImages);
            currentImageIdx = Math.min(currentImageIdx, IMAGES.length - 1);
            showImage(currentImageIdx);
            setUploadStatus('');
            renderUserThumbs();
          } catch {
            setUploadStatus('Could not remove photo. Browser storage is unavailable.', 'error');
          }
        });
        wrap.appendChild(img);
        wrap.appendChild(del);
        userPhotoThumbs.appendChild(wrap);
      });
    }

    let lastUploadedIdx = -1;
    let uploadBusy = false;

    function setUploadStatus(message, state = '') {
      uploadStatus.textContent = message || '';
      uploadStatus.dataset.state = state;
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Could not read that file. Try a different image.'));
        reader.onabort = () => reject(new Error('Upload was cancelled before completion.'));
        reader.readAsDataURL(file);
      });
    }

    function loadImage(dataUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('That file is not a supported image format.'));
        img.src = dataUrl;
      });
    }

    function optimizeImageDataUrl(img) {
      const maxEdge = 1920;
      const sourceMax = Math.max(img.width, img.height) || 1;
      const scale = Math.min(1, maxEdge / sourceMax);
      const targetW = Math.max(1, Math.round(img.width * scale));
      const targetH = Math.max(1, Math.round(img.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = targetW;
      canvas.height = targetH;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, targetW, targetH);
      return canvas.toDataURL('image/jpeg', 0.88);
    }

    document.getElementById('uploadLabel').addEventListener('click', () => {
      photoUpload.click();
    });

    photoUpload.addEventListener('change', async () => {
      const file = photoUpload.files && photoUpload.files[0];
      photoUpload.value = '';
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        setUploadStatus('Please choose an image file.', 'error');
        return;
      }
      if (uploadBusy) return;
      uploadBusy = true;
      setUploadStatus('Processing photo...', 'working');
      try {
        const rawDataUrl = await readFileAsDataURL(file);
        const image = await loadImage(rawDataUrl);
        const optimizedDataUrl = optimizeImageDataUrl(image);
        const nextImages = userImages.concat(optimizedDataUrl);
        saveUserImages(nextImages);
        userImages = nextImages;
        IMAGES = BASE_IMAGES.concat(userImages);
        lastUploadedIdx = IMAGES.length - 1;
        showImage(lastUploadedIdx);
        renderUserThumbs();
        setUploadStatus('');
      } catch (err) {
        const quotaHit = err && (err.name === 'QuotaExceededError' || err.name === 'NS_ERROR_DOM_QUOTA_REACHED');
        if (quotaHit) {
          setUploadStatus('Storage is full. Remove an existing photo and try again.', 'error');
        } else {
          const message = err && err.message ? err.message : 'Upload failed. Try a smaller image.';
          setUploadStatus(message, 'error');
        }
      } finally {
        uploadBusy = false;
      }
    });

    settingsBackdrop.addEventListener('click', closeSettings);

    // ── Timeline Calendar ──

    const TIMELINE_NOTES_KEY = 'timeline_notes';
    const TL_MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const TL_DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    let timelineNotes = {};
    try {
      const tlRaw = localStorage.getItem(TIMELINE_NOTES_KEY);
      if (tlRaw) timelineNotes = JSON.parse(tlRaw) || {};
    } catch { timelineNotes = {}; }

    function saveTimelineNotes() {
      localStorage.setItem(TIMELINE_NOTES_KEY, JSON.stringify(timelineNotes));
    }

    function dateToKey(d) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function formatDateDisplay(key) {
      const p = key.split('-');
      const d = new Date(+p[0], +p[1] - 1, +p[2]);
      return TL_DAY_SHORT[d.getDay()] + ', ' + TL_MONTH_SHORT[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    }

    const tlStrip = document.getElementById('timelineStrip');
    const tlTooltip = document.getElementById('timelineTooltip');
    const tlNoteOverlay = document.getElementById('timelineNoteOverlay');
    const tlNoteDateEl = document.getElementById('timelineNoteDate');
    const tlNoteCloseBtn = document.getElementById('timelineNoteClose');
    const tlNoteTextarea = document.getElementById('timelineNoteTextarea');

    let tlActiveKey = null;

    function renderTimeline() {
      tlStrip.innerHTML = '';
      tlTooltip.classList.remove('visible');

      const blocksPerRow = Math.max(30, Math.floor(window.innerWidth / 44));
      const totalBlocks = blocksPerRow * 2;
      const pastBlocks = Math.round(totalBlocks * 0.15);

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const todayKey = dateToKey(today);

      const start = new Date(today);
      start.setDate(start.getDate() - pastBlocks);

      const entries = [];
      for (let i = 0; i < totalBlocks; i++) {
        const d = new Date(start);
        d.setDate(d.getDate() + i);
        entries.push(d);
      }

      for (let r = 0; r < 2; r++) {
        const rowDates = entries.slice(r * blocksPerRow, (r + 1) * blocksPerRow);
        const rowEl = document.createElement('div');
        rowEl.className = 'timeline-row';

        const monthsEl = document.createElement('div');
        monthsEl.className = 'timeline-months';
        const blocksEl = document.createElement('div');
        blocksEl.className = 'timeline-blocks';

        let prevMonth = -1;

        rowDates.forEach((d, idx) => {
          const key = dateToKey(d);
          const dow = d.getDay();
          const isWeekend = dow === 0 || dow === 6;
          const isToday = key === todayKey;
          const noteText = timelineNotes[key];
          const hasNote = !!(noteText && noteText.trim());

          if (d.getMonth() !== prevMonth) {
            const lbl = document.createElement('span');
            lbl.className = 'timeline-month-label';
            let labelText = TL_MONTH_SHORT[d.getMonth()];
            if ((r === 0 && idx === 0) || d.getMonth() === 0) labelText += ' \u2019' + String(d.getFullYear()).slice(2);
            lbl.textContent = labelText;
            lbl.style.left = ((idx / rowDates.length) * 100) + '%';
            monthsEl.appendChild(lbl);
            prevMonth = d.getMonth();
          }

          const block = document.createElement('div');
          block.className = 'timeline-block';
          if (isWeekend) block.classList.add('timeline-block--weekend');
          if (isToday) block.classList.add('timeline-block--today');
          if (hasNote) block.classList.add('timeline-block--has-note');
          block.textContent = d.getDate();
          block.dataset.dateKey = key;

          block.addEventListener('dblclick', () => openTimelineNote(key));

          block.addEventListener('mouseenter', () => {
            const text = timelineNotes[key];
            if (!text || !text.trim()) return;
            const preview = text.length > 200 ? text.slice(0, 200) + '\u2026' : text;
            tlTooltip.textContent = preview;
            const rect = block.getBoundingClientRect();
            const maxLeft = window.innerWidth - 128;
            tlTooltip.style.left = Math.max(128, Math.min(rect.left + rect.width / 2, maxLeft)) + 'px';
            tlTooltip.style.bottom = (window.innerHeight - rect.top + 8) + 'px';
            tlTooltip.style.transform = 'translateX(-50%)';
            tlTooltip.classList.add('visible');
          });

          block.addEventListener('mouseleave', () => {
            tlTooltip.classList.remove('visible');
          });

          blocksEl.appendChild(block);
        });

        rowEl.appendChild(monthsEl);
        rowEl.appendChild(blocksEl);
        tlStrip.appendChild(rowEl);
      }
    }

    function openTimelineNote(key) {
      tlActiveKey = key;
      tlNoteDateEl.textContent = formatDateDisplay(key);
      tlNoteTextarea.value = timelineNotes[key] || '';
      tlNoteOverlay.classList.add('open');
      setTimeout(() => tlNoteTextarea.focus(), 50);
    }

    function closeTimelineNote() {
      if (tlActiveKey) {
        const text = tlNoteTextarea.value;
        if (text && text.trim()) {
          timelineNotes[tlActiveKey] = text;
        } else {
          delete timelineNotes[tlActiveKey];
        }
        saveTimelineNotes();
        renderTimeline();
      }
      tlActiveKey = null;
      tlNoteOverlay.classList.remove('open');
    }

    tlNoteCloseBtn.addEventListener('click', closeTimelineNote);
    tlNoteOverlay.addEventListener('click', (e) => {
      if (e.target === tlNoteOverlay) closeTimelineNote();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && tlNoteOverlay.classList.contains('open')) {
        closeTimelineNote();
      }
    });

    const TIMELINE_POS_KEY = 'timeline_pos_y';

    function getTimelineDefaultY() {
      return window.innerHeight - tlStrip.offsetHeight;
    }

    function applyTimelineY(y) {
      const maxY = window.innerHeight - tlStrip.offsetHeight;
      const clamped = Math.max(0, Math.min(y, maxY));
      tlStrip.style.top = clamped + 'px';
      tlStrip.style.bottom = 'auto';
    }

    function saveTimelinePos() {
      localStorage.setItem(TIMELINE_POS_KEY, tlStrip.style.top);
    }

    renderTimeline();

    const savedTlY = localStorage.getItem(TIMELINE_POS_KEY);
    applyTimelineY(savedTlY !== null ? parseFloat(savedTlY) : getTimelineDefaultY());

    let tlDrag = null;

    tlStrip.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      const rect = tlStrip.getBoundingClientRect();
      tlDrag = {
        offsetY: e.clientY - rect.top,
        startY: e.clientY,
        started: false,
        pointerId: e.pointerId
      };
    });

    document.addEventListener('pointermove', (e) => {
      if (!tlDrag) return;
      if (!tlDrag.started) {
        if (Math.abs(e.clientY - tlDrag.startY) < 4) return;
        tlDrag.started = true;
        tlStrip.classList.add('dragging');
        tlStrip.setPointerCapture(tlDrag.pointerId);
      }
      applyTimelineY(e.clientY - tlDrag.offsetY);
    });

    document.addEventListener('pointerup', () => {
      if (!tlDrag) return;
      const wasDragging = tlDrag.started;
      tlDrag = null;
      if (wasDragging) {
        tlStrip.classList.remove('dragging');
        const y = parseFloat(tlStrip.style.top) || 0;
        const maxY = window.innerHeight - tlStrip.offsetHeight;
        const snapped = snapCoordToGrid(y, 0, maxY, DRAGGABLE_SNAP_STEP);
        tlStrip.style.top = snapped + 'px';
        saveTimelinePos();
      }
    });

    let tlResizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(tlResizeTimer);
      tlResizeTimer = setTimeout(() => {
        renderTimeline();
        applyTimelineY(parseFloat(tlStrip.style.top) || getTimelineDefaultY());
      }, 100);
    });
  </script>

</body>
</html>
